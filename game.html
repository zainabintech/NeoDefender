<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NeoDefender</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- Background layer: Matrix digital rain -->
  <canvas id="matrixRain"></canvas>

  <!-- Foreground layer: the actual game zone where pills are drawn -->
  <canvas id="gameZoneDisplay"></canvas>

  <!-- HUD: score / time / level / combo, shown while the game is running -->
  <div class="scoreAndTimeDisplay hide">
    <span class="hud-item">Score: <span id="score">0</span></span>
    <span class="hud-item">Time: <span id="timer">60</span>s</span>
    <span class="hud-item">Level: <span id="level">1</span></span>
    <span class="hud-item combo-item">Combo: <span id="combo">0</span>x</span>
  </div>

  <!-- Shields: remaining chances before the Matrix collapses -->
  <div class="shieldsDisplay hide">
    <img src="./image/shield.png" alt="Shield" class="shield">
    <img src="./image/shield.png" alt="Shield" class="shield">
    <img src="./image/shield.png" alt="Shield" class="shield">
    <img src="./image/shield.png" alt="Shield" class="shield">
    <img src="./image/shield.png" alt="Shield" class="shield">
  </div>

  <!-- Game-over / victory screen -->
  <div class="endGameDisplay hide">
    <p id="result"></p>
    <p id="finalScore"></p>
    <p id="highScore"></p>
    <button id="playAgainButton">Play Again</button>
  </div>

  <!-- Background music continues during gameplay -->
  <audio id="background-music" loop>
    <source src="audio/The Matrix Reloaded OST - Highway Chase Music.mp3" type="audio/mpeg">
  </audio>

  <script src="./js/matrixRain.js"></script>
  <script src="./js/gameLogic.js"></script>
</body>
</html>
